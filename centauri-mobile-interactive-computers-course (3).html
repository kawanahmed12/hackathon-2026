<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Centauri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0d0b;
  --bg2: #121712;
  --bg3: #1a211a;
  --g: #00e87a;
  --g2: #00c464;
  --g3: #009e50;
  --ink: #edf5ef;
  --muted: #6b8870;
  --line: rgba(0,232,122,.11);
  --line2: rgba(0,232,122,.06);
  --amber: #f5b731;
  --red: #ff5f5f;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  color:var(--ink);
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  position:relative;
  overscroll-behavior:none;
}

/* ── STATUS BAR ── */
.statusbar{
  height:44px;background:rgba(10,13,11,.9);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;
  font-size:12px;font-weight:500;letter-spacing:.02em;
  backdrop-filter:blur(10px);
}
.statusbar-time{font-family:'DM Mono',monospace;color:var(--ink);}
.statusbar-icons{display:flex;align-items:center;gap:5px;color:var(--ink);}
.sb-icon{font-size:13px;}

/* ── SCREEN SYSTEM ── */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.32,.72,0,1);
}
.screen.active{transform:translateX(0);}
.screen.exit{transform:translateX(-30%);}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(86px + var(--safe-bottom));}
.scroll::-webkit-scrollbar{display:none;}

/* ── TOP BAR ── */
.topbar{
  padding:14px 18px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  background:rgba(10,13,11,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:10;
}
.topbar-logo{
  display:flex;align-items:center;gap:8px;
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;color:var(--ink);
}
.logo-hex{
  width:28px;height:28px;border-radius:8px;
  background:var(--g);display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#000;font-weight:700;
}
.topbar-right{display:flex;align-items:center;gap:8px;}
.xp-chip{
  background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.2);
  border-radius:20px;padding:4px 10px;
  font-family:'DM Mono',monospace;font-size:11px;color:var(--g);font-weight:500;
}
.streak-chip{
  background:rgba(245,183,49,.1);border:1px solid rgba(245,183,49,.2);
  border-radius:20px;padding:4px 10px;
  font-size:11px;color:var(--amber);font-weight:500;
}
.back-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.06);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;color:var(--ink);
  border:none;
}

/* ── BOTTOM NAV ── */
.bottomnav{
  display:flex;
  background:rgba(12,17,12,.95);
  border-top:1px solid var(--line);
  backdrop-filter:blur(20px);
  padding-bottom:calc(var(--safe-bottom) + 6px);
  flex-shrink:0;
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:10px 0;cursor:pointer;
  border:none;background:none;color:var(--muted);
  font-family:'DM Sans',sans-serif;transition:color .2s;
}
.bnav-item.active{color:var(--g);}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-label{font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;}

/* ── HOME SCREEN ── */
.home-hero{
  margin:18px 16px 14px;
  background:linear-gradient(135deg,rgba(0,232,122,.1) 0%,rgba(0,158,80,.05) 100%);
  border:1px solid rgba(0,232,122,.18);border-radius:20px;
  padding:20px;position:relative;overflow:hidden;
}
.home-hero::before{
  content:'⬡';position:absolute;right:-10px;top:-10px;
  font-size:90px;color:rgba(0,232,122,.04);line-height:1;
}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--g);margin-bottom:6px;}
.hero-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.03em;margin-bottom:2px;}
.hero-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.hero-stats{display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
.hstat{flex:1;text-align:center;padding:10px 6px;background:rgba(0,0,0,.2);}
.hstat:not(:last-child){border-right:1px solid var(--line);}
.hstat-num{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--g);}
.hstat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}

.section-head{
  padding:16px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;}
.section-link{font-size:11px;color:var(--g);font-weight:500;}

/* continue card */
.continue-card{
  margin:0 16px 16px;
  background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .2s;
  position:relative;overflow:hidden;
}
.continue-card:active{opacity:.85;}
.cc-icon{width:44px;height:44px;border-radius:12px;background:rgba(0,232,122,.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-label{font-size:10px;color:var(--g);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;}
.cc-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-prog{font-size:11px;color:var(--muted);margin-top:3px;}
.cc-arrow{color:var(--muted);font-size:18px;flex-shrink:0;}
.prog-bar{height:3px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--g);}

/* quick stats row */
.quick-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin:0 16px 20px;
}
.qs-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:14px;
  padding:14px;
}
.qs-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.qs-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--g);}
.qs-val.amber{color:var(--amber);}

/* ── COURSES SCREEN ── */
.filter-scroll{
  display:flex;gap:7px;overflow-x:auto;padding:10px 16px 12px;flex-shrink:0;
}
.filter-scroll::-webkit-scrollbar{display:none;}
.ftag{
  white-space:nowrap;padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:500;border:1px solid var(--line);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .18s;font-family:'DM Sans',sans-serif;flex-shrink:0;
}
.ftag.active{border-color:var(--g);color:var(--g);background:rgba(0,232,122,.08);}

.course-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px;}
.course-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:18px;
  padding:16px;cursor:pointer;transition:border-color .2s;
  position:relative;overflow:hidden;
}
.course-card:active{opacity:.85;}
.course-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,232,122,.05),transparent);
  opacity:0;transition:opacity .2s;
}
.course-card:hover::after{opacity:1;}
.cc-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.cc-ico{width:42px;height:42px;border-radius:12px;background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.15);display:flex;align-items:center;justify-content:center;font-size:18px;}
.cc-badge-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.level-badge{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border-radius:6px;}
.level-beginner{background:rgba(0,232,122,.12);color:var(--g);}
.level-intermediate{background:rgba(245,183,49,.1);color:var(--amber);}
.level-advanced{background:rgba(255,95,95,.1);color:var(--red);}
.time-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.cc-title-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.03em;margin-bottom:1px;}
.cc-tagline{font-size:11px;color:var(--g);font-style:italic;font-weight:300;margin-bottom:8px;}
.cc-overview{font-size:12px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.cc-bottom{display:flex;align-items:center;justify-content:space-between;}
.cc-mods{font-size:10px;color:var(--muted);}
.cc-enroll-btn{
  padding:6px 14px;border-radius:10px;font-size:11px;font-weight:600;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;
}
.cc-enroll-btn.enroll{background:var(--g);color:#000;}
.cc-enroll-btn.enrolled{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);color:var(--g);}
.cc-prog-wrap{margin-top:10px;}
.cc-prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}

/* ── COURSE DETAIL SCREEN ── */
.detail-hero{
  padding:20px 16px 16px;
  background:linear-gradient(180deg,rgba(0,232,122,.07) 0%,transparent 100%);
}
.detail-icon-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.detail-icon{width:52px;height:52px;border-radius:14px;background:rgba(0,232,122,.12);border:1px solid rgba(0,232,122,.2);display:flex;align-items:center;justify-content:center;font-size:24px;}
.detail-badges{display:flex;flex-direction:column;gap:4px;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;margin-bottom:2px;}
.detail-tag{font-size:12px;color:var(--g);font-style:italic;font-weight:300;margin-bottom:12px;}
.detail-overview{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:16px;}
.detail-meta{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid var(--line);margin-bottom:16px;}
.dmeta{flex:1;text-align:center;padding:8px 4px;background:rgba(0,0,0,.2);}
.dmeta:not(:last-child){border-right:1px solid var(--line);}
.dmeta-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ink);}
.dmeta-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.enroll-main{
  width:100%;padding:13px;border-radius:14px;font-size:14px;font-weight:600;
  border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.enroll-main.cta{background:var(--g);color:#000;}
.enroll-main.done{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.3);color:var(--g);}

.tabs-row{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;}
.tab.active{color:var(--g);border-bottom-color:var(--g);}

/* modules */
.modules-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.mod-item{
  background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  transition:border-color .2s;
}
.mod-item.completed{border-color:rgba(0,232,122,.3);}
.mod-head{
  display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;
}
.mod-num{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.15);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--g);
}
.mod-num.done{background:rgba(0,232,122,.2);border-color:rgba(0,232,122,.4);}
.mod-info{flex:1;min-width:0;}
.mod-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-hrs{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;}
.mod-expand{display:none;padding:0 14px 14px 50px;}
.mod-item.open .mod-expand{display:block;animation:fd .2s ease;}
@keyframes fd{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
.mod-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px;}
.outcomes{list-style:none;margin-bottom:10px;}
.outcomes li{font-size:11px;color:var(--muted);padding:4px 0;display:flex;gap:6px;border-bottom:1px solid var(--line2);}
.outcomes li:last-child{border:none;}
.check{color:var(--g);flex-shrink:0;font-size:10px;margin-top:1px;}
.btn-complete{
  width:100%;padding:9px;border-radius:10px;font-size:12px;font-weight:600;
  background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.2);
  color:var(--g);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;
}
.btn-complete.done{background:rgba(0,232,122,.18);border-color:rgba(0,232,122,.4);}

/* exam block */
.exam-block{
  margin:0 16px 16px;
  border:1px solid rgba(245,183,49,.25);border-radius:14px;
  background:rgba(245,183,49,.04);padding:14px;
}
.exam-eyebrow{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;}
.exam-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.03em;margin-bottom:6px;}
.exam-desc{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:10px;}
.exam-reqs{list-style:none;margin-bottom:10px;}
.exam-reqs li{font-size:11px;color:var(--muted);padding:3px 0;display:flex;gap:6px;}
.a-check{color:var(--amber);flex-shrink:0;}
.xp-reward{
  background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.2);
  border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;
}
.xp-big{font-family:'DM Mono',monospace;font-weight:500;font-size:16px;color:var(--g);}
.xp-note{font-size:10px;color:var(--muted);line-height:1.4;}

/* quiz */
.quiz-wrap{padding:16px;}
.quiz-header{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.03em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.quiz-q{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:14px;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);font-size:12px;cursor:pointer;transition:all .2s;
  text-align:left;font-family:'DM Sans',sans-serif;color:var(--ink);
}
.quiz-opt:active:not(:disabled){transform:scale(.98);}
.quiz-opt.correct{border-color:var(--g);background:rgba(0,232,122,.1);color:var(--g);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(255,95,95,.08);color:var(--red);}
.quiz-feedback{margin-top:10px;padding:10px 12px;border-radius:10px;font-size:11px;line-height:1.5;}
.quiz-feedback.pass{background:rgba(0,232,122,.08);border:1px solid rgba(0,232,122,.2);color:var(--g);}
.quiz-feedback.fail{background:rgba(255,95,95,.07);border:1px solid rgba(255,95,95,.2);color:var(--red);}
.btn-next{
  width:100%;margin-top:10px;padding:11px;border-radius:12px;
  border:1px solid var(--line);background:transparent;color:var(--muted);
  font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.quiz-done{text-align:center;padding:30px 16px;}
.quiz-done-icon{font-size:48px;margin-bottom:12px;}
.quiz-done-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;margin-bottom:6px;}
.quiz-done-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.btn-retry{
  padding:11px 28px;border-radius:12px;border:none;
  background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);
  color:var(--g);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
}

/* ── PROGRESS SCREEN ── */
.progress-wrap{padding:16px;}
.prog-course-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:10px;cursor:pointer;
}
.prog-course-card:active{opacity:.85;}
.pcc-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pcc-icon{width:38px;height:38px;border-radius:10px;background:rgba(0,232,122,.1);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.pcc-title{font-size:14px;font-weight:500;}
.pcc-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.pcc-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--g);margin-left:auto;}
.empty-prog{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:500;color:var(--ink);margin-bottom:6px;}
.empty-sub{font-size:12px;line-height:1.55;}
.btn-goto{
  margin-top:16px;display:inline-block;padding:10px 24px;border-radius:12px;
  background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);
  color:var(--g);font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;border:none;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(72px + var(--safe-bottom) + 10px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(18,23,18,.96);border:1px solid rgba(0,232,122,.3);
  border-radius:20px;padding:8px 16px;
  font-size:12px;color:var(--ink);
  display:flex;align-items:center;gap:6px;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
  z-index:999;backdrop-filter:blur(12px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-g{color:var(--g);}

/* ── XP POP ── */
.xp-pop{
  position:fixed;z-index:999;
  font-family:'DM Mono',monospace;font-weight:500;font-size:16px;color:var(--g);
  pointer-events:none;
  animation:xpFloat 1.4s ease forwards;
}
@keyframes xpFloat{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-50px) scale(1.2);}}

/* ── ANIMATIONS ── */
.screen{will-change:transform;}
@media (prefers-reduced-motion:reduce){.screen{transition:none;}}

/* ── COURSE CARD OVERLAP FIX ── */
#screen-courses .scroll{
  padding-bottom:calc(92px + var(--safe-bottom));
}

.course-list{
  gap:14px;
  padding-bottom:calc(100px + var(--safe-bottom));
}

.course-card{
  display:flex;
  flex-direction:column;
  min-height:0;
  height:auto;
  overflow:visible;
  isolation:isolate;
}

.course-card > *{
  position:relative;
  z-index:2;
}

.course-card::after{
  pointer-events:none;
  z-index:0;
}

.cc-overview{
  margin-bottom:12px;
}

.cc-prog-wrap{
  margin:10px 0 10px;
  flex-shrink:0;
}

.cc-bottom{
  margin-top:auto;

    {q:'Best HTML element for site navigation:',opts:['<div id="nav">','<section>','<nav>','<header>'],ans:2,exp:'<nav> is the semantic landmark for navigation — announced by screen readers.'},
    {q:'In CSS Grid, "fr" stands for:',opts:['frequency','fraction','flex-row','full-relative'],ans:1,exp:'"fr" is a fractional unit — 1fr means one share of available space.'}

// ══════════ STATE ══════════
const S={xp:0,streak:0,enrolled:{},quiz:{},filter:'all',currentCourse:null,detailTab:'modules',prevScreen:null};

// ══════════ NAVIGATION ══════════
let histStack=['home'];
function goTo(screen){
  if(screen===currentScreen()) return;
  const cur=document.getElementById('screen-'+currentScreen());
  cur.classList.add('exit');
  setTimeout(()=>cur.classList.remove('exit'),350);
  const next=document.getElementById('screen-'+screen);
  next.classList.add('active');
  setTimeout(()=>{ cur.classList.remove('active'); },10);
  histStack.push(screen);
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.toggle('active',b.dataset.screen===screen));
  if(screen==='courses') renderCourses();
  if(screen==='progress') renderProgress();
  if(screen==='home') renderHome();
}
function goBack(){
  if(histStack.length<=1) return;
  histStack.pop();
  const prev=histStack[histStack.length-1];
  const cur=document.getElementById('screen-detail');
  cur.classList.remove('active');
  cur.classList.remove('exit');

  const prevEl=document.getElementById('screen-'+prev);
  prevEl.classList.add('active');
  prevEl.classList.remove('exit');

  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.toggle('active',b.dataset.screen===prev));
  if(prev==='courses') renderCourses();
  if(prev==='home') renderHome();
  if(prev==='progress') renderProgress();
}
function currentScreen(){ return histStack[histStack.length-1]; }

function openDetail(id){
  S.currentCourse=id; S.detailTab='modules';
  const c=COURSES.find(x=>x.id===id);
  document.getElementById('detailTopTitle').textContent=c.title;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));

  const scr=document.getElementById('screen-detail');
  const cur=document.getElementById('screen-'+currentScreen());

  // Keep only the detail screen visible after opening.
  // This prevents the course list/cards from sitting underneath and visually overlapping.
  cur.classList.add('exit');
  scr.classList.add('active');

  setTimeout(()=>{
    cur.classList.remove('active');
    cur.classList.remove('exit');
  },320);

  histStack.push('detail');
  document.getElementById('detailScroll').scrollTop=0;
  renderDetailTab();
}

// ══════════ FILTER ══════════
function setFilter(btn, f){
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  S.filter=f; renderCourses();
}

// ══════════ RENDER COURSES ══════════
function renderCourses(){
  document.getElementById('coursesXP').textContent=S.xp;
  let list=COURSES;
  const f=S.filter;
  if(f==='enrolled') list=list.filter(c=>S.enrolled[c.id]);
  else if(f==='beginner') list=list.filter(c=>c.level==='beginner');
  else if(f==='intermediate') list=list.filter(c=>c.level==='intermediate');
  else if(['coding','design','mkt','video','ai','web'].includes(f)) list=list.filter(c=>c.id===f);
  document.getElementById('courseList').innerHTML=list.map(c=>{
    const enr=S.enrolled[c.id]; const prog=enr?(enr.progress||0):0;
    return `<div class="course-card" onclick="openDetail('${c.id}')">
      <div class="cc-row1">
        <div class="cc-ico">${c.icon}</div>
        <div class="cc-badge-wrap">
          <div class="level-badge level-${c.level}">${c.level}</div>
          <div class="time-badge">${c.time}</div>
        </div>
      </div>
      <div class="cc-title-main">${c.title}</div>
      <div class="cc-tagline">${c.tag}</div>
      <div class="cc-overview">${c.overview}</div>
      ${enr?`<div class="cc-prog-wrap"><div class="cc-prog-row"><span>${enr.completedMods.length}/${c.modules.length} modules</span><span>${prog}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div></div>`:''}
      <div class="cc-bottom">
        <div class="cc-mods">${c.modules.length} modules · ${c.totalHrs}</div>
        <button class="cc-enroll-btn ${enr?'enrolled':'enroll'}" onclick="event.stopPropagation();enroll('${c.id}',this)">${enr?'✓ Enrolled':'+ Enrol'}</button>

function enroll(id,btn){
  if(!S.enrolled[id]){
    S.enrolled[id]={progress:0,completedMods:[]};
    S.xp+=50; showToast('Enrolled! +50 XP 🚀'); xpPop(50);
    if(btn){ btn.className='cc-enroll-btn enrolled'; btn.textContent='✓ Enrolled'; }
    syncUI();
  }
}

function toggleMod(cid, idx){
  const el=document.getElementById(`moditem-${cid}-${idx}`);
  const was=el.classList.contains('open');
  document.querySelectorAll('.mod-item').forEach(m=>m.classList.remove('open'));
  if(!was) el.classList.add('open');
}

function completeMod(cid, idx){
  if(!S.enrolled[cid]){ enroll(cid,null); }
  const enr=S.enrolled[cid];
  if(!enr.completedMods.includes(idx)){
    enr.completedMods.push(idx);
    const total=COURSES.find(c=>c.id===cid).modules.length;
    enr.progress=Math.round((enr.completedMods.length/total)*100);
    S.xp+=100; S.streak=Math.max(1,S.streak+1);
    showToast('Module done! +100 XP ⚡'); xpPop(100);
  }
  syncUI(); renderDetailTab();
}

// ══════════ QUIZ ══════════
function renderQuiz(id){
  const scroll=document.getElementById('detailScroll');
  const qs=QUIZZES[id];
  if(!S.quiz[id]) S.quiz[id]={qIdx:0,score:0,done:false};
  const qi=S.quiz[id];
  if(qi.done||qi.qIdx>=qs.length){
    const pct=Math.round((qi.score/qs.length)*100);
    scroll.innerHTML=`<div class="quiz-done">
      <div class="quiz-done-icon">${pct>=50?'🎉':'📚'}</div>
      <div class="quiz-done-title">${pct>=50?'Nice work!':'Keep studying!'}</div>
      <div class="quiz-done-sub">Score: ${qi.score}/${qs.length} (${pct}%)</div>
      <button class="btn-retry" onclick="resetQuiz('${id}')">Try again</button>
    </div>`; return;
  }
  const q=qs[qi.qIdx];
  scroll.innerHTML=`<div class="quiz-wrap">
    <div class="quiz-header">⚡ Quiz · Q${qi.qIdx+1}/${qs.length}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz('${id}',${i})">${o}</button>`).join('')}</div>
    <div id="qfeedback"></div>
  </div>`;
}

function answerQuiz(id, chosen){
  const qs=QUIZZES[id]; const qi=S.quiz[id]; const q=qs[qi.qIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.disabled=true);
  const right=chosen===q.ans;
  opts[chosen].classList.add(right?'correct':'wrong');
  if(!right) opts[q.ans].classList.add('correct');
  if(right){ qi.score++; S.xp+=20; xpPop(20); syncUI(); }
  document.getElementById('qfeedback').innerHTML=`
    <div class="quiz-feedback ${right?'pass':'fail'}">${right?'✓ Correct! ':'✗ Not quite. '}${q.exp}</div>
    <button class="btn-next" onclick="nextQ('${id}')">${qi.qIdx+1<qs.length?'Next →':'See results →'}</button>`;
}
function nextQ(id){ const qi=S.quiz[id]; qi.qIdx++; if(qi.qIdx>=QUIZZES[id].length) qi.done=true; renderQuiz(id); }
function resetQuiz(id){ S.quiz[id]={qIdx:0,score:0,done:false}; renderQuiz(id); }

// ══════════ SYNC ══════════
function syncUI(){
  document.getElementById('homeXP').textContent=S.xp;
  document.getElementById('homeStreak').textContent=S.streak;
  document.getElementById('coursesXP').textContent=S.xp;

// ══════════ TOAST ══════════
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function xpPop(n){
  const p=document.createElement('div');
  p.className='xp-pop'; p.textContent='+'+n+' XP';
  p.style.cssText='right:20px;bottom:90px;';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1500);
}


// ══════════ INTERACTIVE LESSON LAB ══════════
function codingModuleOneLab(){
  return `
    <div class="lesson-lab">
      <div class="lesson-card">
        <div class="lesson-kicker">Mini lesson</div>
        <div class="lesson-title">Computers are fast instruction-followers</div>
        <div class="lesson-copy">
          A computer is not “thinking” like a person. It repeatedly takes input, follows instructions, processes data, stores what it needs, and produces output. Every app is built from this loop.
        </div>
        <div class="lesson-code">Input → Process → Store → Output</div>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Interactive 01</div>
        <div class="lesson-title">You are the processor</div>
        <div class="lesson-copy">Tap run to see how a CPU handles a tiny instruction like <b>2 + 2</b>.</div>
        <div class="lesson-code">instruction = 2 + 2</div>
        <button class="lesson-action" onclick="runCpuSimulation()">Run CPU simulation</button>
        <div class="sim-output" id="cpuSimOutput">Waiting for instruction...</div>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Interactive 02</div>
        <div class="lesson-title">Binary translator</div>
        <div class="lesson-copy">Computers store everything using 1s and 0s. Type a number from 0 to 255 and convert it into 8-bit binary.</div>
        <div class="binary-row">
          <input id="binaryInput" class="binary-input" type="number" min="0" max="255" value="5" aria-label="Type a number from 0 to 255">
          <button class="lesson-action" style="width:auto;margin-top:0;" onclick="convertBinary()">Convert</button>
        </div>
        <div class="binary-result" id="binaryResult">5 → 00000101</div>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Interactive 03</div>
        <div class="lesson-title">RAM vs storage</div>
        <div class="lesson-copy">
          RAM is temporary working memory. Storage is long-term memory. Open tabs use RAM. Saved files live in storage.
        </div>
        <div class="memory-bars">
          <div>
            <div class="mem-label"><span>RAM usage</span><span id="ramLabel">18%</span></div>
            <div class="mem-track"><div class="mem-fill" id="ramFill"></div></div>
          </div>
          <div>
            <div class="mem-label"><span>Storage saved</span><span id="storageLabel">22%</span></div>
            <div class="mem-track"><div class="mem-fill" id="storageFill" style="width:22%;"></div></div>
          </div>
        </div>
        <button class="lesson-action" onclick="openTabsSim()">Open 12 tabs</button>
        <button class="lesson-action" onclick="saveFileSim()">Save project file</button>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Interactive 04</div>
        <div class="lesson-title">What happens when you open a website?</div>
        <div class="lesson-copy">Tap through the journey from typing a website name to seeing the page appear.</div>
        <div class="timeline" id="webTimeline">
          <div class="timeline-step active"><span class="tdot">1</span>Browser sends a request</div>
          <div class="timeline-step"><span class="tdot">2</span>DNS finds the correct server</div>
          <div class="timeline-step"><span class="tdot">3</span>Server sends files back</div>
          <div class="timeline-step"><span class="tdot">4</span>Browser reads HTML, CSS and JavaScript</div>
          <div class="timeline-step"><span class="tdot">5</span>The page appears on screen</div>
        </div>
        <button class="lesson-action" onclick="nextWebStep()">Next step</button>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Mini challenge</div>
        <div class="lesson-title">Match the component to its job</div>
        <div class="lesson-copy">Choose the correct role for each computer component.</div>
        <div class="match-grid">
          ${matchRow('CPU','cpu')}
          ${matchRow('RAM','ram')}
          ${matchRow('SSD','ssd')}
          ${matchRow('GPU','gpu')}
        </div>
        <button class="lesson-action" onclick="checkComponentMatch()">Check answers</button>
        <div class="challenge-result" id="matchResult">Complete the matches to earn the confidence boost.</div>
      </div>

      <div class="lesson-card">
        <div class="lesson-kicker">Reflection</div>
        <div class="lesson-title">Real-world checkpoint</div>
        <div class="lesson-copy">
          Why does your laptop slow down when you have too many apps open? Answer: because those apps compete for RAM and CPU time. Developers who understand the machine can build faster, more reliable apps.

}

function matchRow(label,id){
  return `<div class="match-row">
    <div class="match-chip">${label}</div>
    <select class="match-select" id="match-${id}">
      <option value="">Choose role...</option>
      <option value="process">Processes instructions</option>
      <option value="temp">Temporary working memory</option>
      <option value="long">Long-term file storage</option>
      <option value="graphics">Graphics and visual processing</option>
    </select>
  </div>`;
}

function runCpuSimulation(){
  const out=document.getElementById('cpuSimOutput');
  if(!out) return;
  const steps=['Fetching instruction...','Decoding: add two numbers...','Processing: 2 + 2...','Storing result in memory...','Output: 4'];
  out.textContent='';
  steps.forEach((s,i)=>setTimeout(()=>{ out.textContent += (i?'\n':'') + s; }, i*450));
}

function convertBinary(){
  const input=document.getElementById('binaryInput');
  const result=document.getElementById('binaryResult');
  if(!input||!result) return;
  let n=parseInt(input.value,10);
  if(isNaN(n)) n=0;
  n=Math.max(0,Math.min(255,n));
  input.value=n;
  result.textContent = n + ' → ' + n.toString(2).padStart(8,'0');
}

function openTabsSim(){
  const fill=document.getElementById('ramFill');
  const label=document.getElementById('ramLabel');
  if(!fill||!label) return;
  fill.style.width='86%';
  label.textContent='86% — system slowing';
  showToast('RAM usage increased');
}

function saveFileSim(){
  const fill=document.getElementById('storageFill');
  const label=document.getElementById('storageLabel');
  if(!fill||!label) return;
  fill.style.width='38%';
  label.textContent='38% — file saved';
  showToast('Saved to storage');
}

let webStep=0;
function nextWebStep(){
  const steps=document.querySelectorAll('#webTimeline .timeline-step');
  if(!steps.length) return;
  webStep=(webStep+1)%steps.length;
  steps.forEach((el,i)=>el.classList.toggle('active',i<=webStep));
}

function checkComponentMatch(){
  const answers={cpu:'process',ram:'temp',ssd:'long',gpu:'graphics'};
  let score=0;
  Object.keys(answers).forEach(k=>{
    const el=document.getElementById('match-'+k);
    if(el && el.value===answers[k]) score++;
  });
  const result=document.getElementById('matchResult');
  if(!result) return;
  if(score===4){
    result.innerHTML='Perfect. CPU, RAM, SSD and GPU all matched correctly. +25 XP confidence boost.';
    result.style.color='var(--g)';
    S.xp += 25;
    syncUI();
    xpPop(25);
  }else{
    result.innerHTML=`${score}/4 correct. Hint: CPU thinks, RAM works short-term, SSD stores long-term, GPU handles visuals.`;
    result.style.color='var(--amber)';
  }
}

// ══════════ STATUS TIME ══════════
function tick(){
  const now=new Date();
  document.getElementById('statusTime').textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
}
tick(); setInterval(tick,10000);

// ══════════ BOOT ══════════
renderCourses();
renderHome();
</script>
